<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founder Curious — April 16, 2026</title>
<meta name="description" content="Founder Curious dinner · April 16, 2026 · SOMA">
<meta property="og:title" content="Founder Curious — April 16, 2026">
<meta property="og:description" content="a16z founder-curious dinner · SOMA">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F8F6F0;--white:#FFFFFF;
  --gold:#C9A96E;--gold-dark:#A8873F;--gold-light:#E8D5A8;
  --ink:#1C1917;--ink-light:#44403C;
  --stone:#78716C;--stone-light:#A8A29E;
  --border:#E7E5E0;--border-light:#F0EDE8;
  --sage:#7A8B5C;--sage-dark:#5A6A40;--sage-light:#D3DCBB;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--cream)}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Playfair Display',Georgia,serif;font-weight:500}
button{font-family:inherit}

.hero{text-align:center;padding:56px 24px 28px}
.hero-eyebrow{font-family:'Playfair Display',serif;font-size:10px;letter-spacing:5px;color:var(--stone-light);text-transform:uppercase;margin-bottom:14px}
.hero h1{font-size:42px;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px}
.hero .subtitle{font-size:14px;color:var(--stone);letter-spacing:0.5px}
.hero .meta{font-size:12px;color:var(--stone-light);margin-top:8px}

.claim-banner{max-width:620px;margin:8px auto 0;padding:14px 24px;background:linear-gradient(180deg,rgba(201,169,110,0.08),rgba(201,169,110,0.03));border:1px solid var(--gold-light);border-radius:14px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:13px;color:var(--ink-light)}
.claim-banner strong{font-family:'Playfair Display',serif;font-weight:600;color:var(--ink)}

/* Sticky user header once claimed */
.dash-header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border-light);background:var(--white);position:sticky;top:0;z-index:50}
.dash-left{display:flex;align-items:center;gap:12px}
.dash-av{width:36px;height:36px;border-radius:50%;background:var(--border-light);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;color:var(--stone);font-size:14px;font-weight:600;background-size:cover;background-position:center}
.dash-info{font-size:13px;line-height:1.3}
.dash-info .label{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--stone-light)}
.dash-info .you{font-family:'Playfair Display',serif;font-weight:600;font-size:15px}
.dash-right{display:flex;align-items:center;gap:10px}
.dash-count{font-size:12px;color:var(--stone);padding:6px 12px;border:1px solid var(--border);border-radius:100px;background:var(--cream)}
.dash-count strong{color:var(--gold-dark);font-weight:600}
.dash-change{font-size:12px;color:var(--gold-dark);cursor:pointer;background:none;border:1px solid var(--gold-light);padding:6px 14px;border-radius:100px;transition:all 0.2s}
.dash-change:hover{background:var(--gold-light)}

.section-header{max-width:1080px;margin:32px auto 14px;padding:0 24px;display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap}
.section-header h2{font-size:22px;font-weight:600}
.section-header .count{font-size:12px;color:var(--stone-light);letter-spacing:0.5px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;max-width:1200px;margin:0 auto;padding:0 24px 80px}

.card{background:var(--white);border-radius:16px;padding:24px 20px 18px;text-align:center;border:2px solid transparent;cursor:pointer;transition:all 0.25s ease;display:flex;flex-direction:column;position:relative;opacity:0;animation:cardSlideUp 0.4s ease forwards}
.card:hover{border-color:var(--gold-light);transform:translateY(-3px);box-shadow:0 8px 24px rgba(201,169,110,0.12)}
.card.is-me{border-color:var(--gold);background:linear-gradient(180deg,#FEFCF7,var(--white))}
.card.is-starred{border-color:var(--gold-light)}

.card-badge{position:absolute;top:10px;left:10px;font-size:9px;text-transform:uppercase;letter-spacing:1.3px;color:var(--gold-dark);background:var(--gold-light);padding:3px 8px;border-radius:100px;font-weight:600;opacity:0.9}
.card-you-badge{position:absolute;top:10px;right:10px;font-size:9px;text-transform:uppercase;letter-spacing:1.3px;color:var(--white);background:var(--gold);padding:3px 8px;border-radius:100px;font-weight:600}

.star-btn{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;border:none;background:var(--cream);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--stone-light);z-index:2}
.star-btn:hover{background:var(--gold-light);color:var(--gold-dark);transform:scale(1.08)}
.star-btn.active{background:var(--gold);color:var(--white);box-shadow:0 2px 8px rgba(201,169,110,0.35)}
.star-btn.active:hover{background:var(--gold-dark)}
.star-btn svg{width:15px;height:15px}

.card-av{width:76px;height:76px;border-radius:50%;margin:10px auto 14px;background:var(--border-light);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;color:var(--stone);font-size:24px;font-weight:500;background-size:cover;background-position:center;flex-shrink:0}
.card .name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;margin-bottom:4px;line-height:1.2;padding:0 4px}
.card .card-role{font-size:11px;color:var(--stone);line-height:1.35;margin-bottom:10px;padding:0 4px;text-transform:uppercase;letter-spacing:0.6px;font-weight:500}
.card .card-bio{font-size:12.5px;color:var(--ink-light);line-height:1.55;padding:0 4px;margin-bottom:auto;text-align:left}
.card .view-link{font-size:10px;color:var(--stone-light);margin-top:14px;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.2s;padding-top:10px;border-top:1px solid var(--border-light)}
.card:hover .view-link{color:var(--gold-dark)}
.card-claim-btn{display:block;width:100%;margin-top:14px;padding:10px 10px;border:1px solid var(--gold-light);border-radius:100px;background:transparent;color:var(--gold-dark);font-family:inherit;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.card-claim-btn:hover{background:var(--gold);color:var(--white);border-color:var(--gold)}

.card-av.is-here{box-shadow:0 0 0 2px var(--white),0 0 0 4px var(--sage)}
.card-here-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;padding:9px 10px;border:1px solid var(--border);border-radius:100px;background:transparent;color:var(--stone);font-family:inherit;font-size:10px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.card-here-btn::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--stone-light);transition:background 0.2s}
.card-here-btn:hover{border-color:var(--sage-light);color:var(--sage-dark)}
.card-here-btn:hover::before{background:var(--sage)}
.card-here-btn.active{background:var(--sage);border-color:var(--sage);color:var(--white)}
.card-here-btn.active::before{background:var(--white)}
.card-here-btn.active:hover{background:var(--sage-dark);border-color:var(--sage-dark);color:var(--white)}
.dash-count.is-here strong{color:var(--sage-dark)}
.btn-secondary.is-here{border-color:var(--sage);color:var(--sage-dark)}
.btn-secondary.is-here:hover{background:var(--sage);color:var(--white);border-color:var(--sage)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(28,25,23,0.55);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(6px);animation:fadeIn 0.2s ease;padding:20px}
.modal{background:var(--white);border-radius:20px;max-width:540px;width:100%;max-height:88vh;overflow-y:auto;position:relative;animation:modalSlideUp 0.3s ease}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:var(--cream);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--stone);transition:all 0.2s;z-index:10;line-height:1}
.modal-close:hover{background:var(--border);color:var(--ink)}

.modal-head{text-align:center;padding:38px 28px 22px;border-bottom:1px solid var(--border-light)}
.modal-av{width:88px;height:88px;border-radius:50%;margin:0 auto 14px;background:var(--border-light);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;color:var(--stone);font-size:28px;font-weight:500;background-size:cover;background-position:center}
.modal-head h3{font-size:26px;margin-bottom:4px}
.modal-head .role{font-size:13px;color:var(--stone);line-height:1.4}
.modal-head .loc{font-size:12px;color:var(--stone-light);margin-top:4px;letter-spacing:0.3px}
.modal-head .host-tag{display:inline-block;margin-top:10px;font-size:9px;text-transform:uppercase;letter-spacing:1.3px;color:var(--gold-dark);background:var(--gold-light);padding:3px 10px;border-radius:100px;font-weight:600}

.modal-body{padding:22px 28px 24px}
.modal-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px;margin-top:22px}
.modal-label:first-child{margin-top:0}
.modal-bio{font-size:13px;line-height:1.7;color:var(--ink-light)}
.modal-headline{font-size:12.5px;line-height:1.65;color:var(--ink-light);font-style:italic;padding-left:12px;border-left:2px solid var(--gold-light)}

.timeline{display:flex;flex-direction:column;gap:10px}
.timeline-item{display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border-light)}
.timeline-item:last-child{border-bottom:none}
.timeline-main{flex:1;min-width:0}
.timeline-title{font-size:13px;color:var(--ink);font-weight:500;line-height:1.3}
.timeline-title strong{font-weight:600}
.timeline-sub{font-size:11.5px;color:var(--stone);line-height:1.4;margin-top:2px}
.timeline-range{font-size:10.5px;color:var(--stone-light);white-space:nowrap;text-transform:uppercase;letter-spacing:0.5px;padding-top:2px}

.modal-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.modal-links .modal-link{margin-top:0}
.modal-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--gold-dark);text-decoration:none;margin-top:14px;padding:8px 14px;border:1px solid var(--gold-light);border-radius:100px;transition:all 0.2s}
.modal-link:hover{background:var(--gold-light)}
.modal-link svg{width:13px;height:13px}

.modal-actions{padding:0 28px 28px;display:flex;flex-direction:column;gap:10px}
.btn-primary{padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--white);font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.3px;transition:all 0.2s}
.btn-primary:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(201,169,110,0.3)}
.btn-secondary{padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--white);color:var(--ink-light);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold-dark)}
.btn-star{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border:none;border-radius:12px;color:var(--white);font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.3px;transition:all 0.2s;background:linear-gradient(135deg,var(--gold),var(--gold-dark))}
.btn-star.active{background:linear-gradient(135deg,#78716C,#44403C)}
.btn-star:hover{transform:scale(1.02)}

.footer{text-align:center;padding:32px 20px 40px;color:var(--stone-light);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.footer span{font-family:'Playfair Display',serif}

/* Gate */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;animation:fadeIn 0.3s ease}
.gate-card{max-width:420px;width:100%;text-align:center}
.gate-title{font-size:48px;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px;margin-top:16px}
.gate-subtitle{font-size:14px;color:var(--stone);letter-spacing:0.5px;margin-bottom:8px}
.gate-meta{font-size:12px;color:var(--stone-light);margin-bottom:32px}
.gate-form{display:flex;gap:10px;flex-direction:column;max-width:320px;margin:0 auto}
.gate-input{padding:14px 20px;border:1.5px solid var(--border);border-radius:100px;font-size:14px;font-family:inherit;background:var(--white);outline:none;text-align:center;letter-spacing:1px;transition:border-color 0.2s;color:var(--ink)}
.gate-input:focus{border-color:var(--gold)}
.gate-btn{padding:14px;border:none;border-radius:100px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--white);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.2s}
.gate-btn:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(201,169,110,0.3)}
.gate-btn:disabled{opacity:0.6;cursor:wait;transform:none;box-shadow:none}
.gate-error{font-size:12px;color:#B91C1C;margin-top:14px;height:16px;opacity:0;transition:opacity 0.2s}
.gate-error.show{opacity:1}
.gate-card.shake{animation:shake 0.4s ease}
.gate-note{font-size:11px;color:var(--stone-light);margin-top:28px;letter-spacing:0.3px;line-height:1.6}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes cardSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalSlideUp{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}

@media(max-width:640px){
  .hero{padding:36px 16px 20px}
  .hero h1{font-size:30px}
  .dash-header{padding:10px 16px}
  .dash-count{display:none}
  .section-header{padding:0 16px;margin:22px auto 12px}
  .section-header h2{font-size:18px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:0 16px 40px}
  .card-av{width:58px;height:58px;font-size:18px}
  .card .name{font-size:14px}
  .modal{border-radius:18px}
  .modal-head{padding:30px 20px 18px}
  .modal-body,.modal-actions{padding-left:20px;padding-right:20px}
}
</style>
</head>

const LS_ME = 'fc_me';
const LS_STARS = (id) => `fc_stars_${id}`;
const LS_PRESENT = (id) => `fc_present_${id}`;

const state = {
  meId: localStorage.getItem(LS_ME) || null,
  stars: new Set(),
  present: new Set(),
  openModal: null,
  confirmClaim: false,
};

function loadStars(){
  if (!state.meId){ state.stars = new Set(); return; }
  try {
    state.stars = new Set(JSON.parse(localStorage.getItem(LS_STARS(state.meId)) || '[]'));
  } catch { state.stars = new Set(); }
}
function saveStars(){
  if (!state.meId) return;
  localStorage.setItem(LS_STARS(state.meId), JSON.stringify([...state.stars]));
}

function loadPresent(){
  if (!state.meId){ state.present = new Set(); return; }
  try {
    state.present = new Set(JSON.parse(localStorage.getItem(LS_PRESENT(state.meId)) || '[]'));
  } catch { state.present = new Set(); }
  state.present.add(state.meId);
}
function savePresent(){
  if (!state.meId) return;
  localStorage.setItem(LS_PRESENT(state.meId), JSON.stringify([...state.present]));
}
function togglePresent(id){
  if (!state.meId || id === state.meId) return;
  if (state.present.has(id)) state.present.delete(id);
  else state.present.add(id);
  savePresent();
  render();
}

function initials(name){
  return name.split(/\s+/).filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase();
}

function personById(id){ return PEOPLE.find(p => p.id === id); }

function toggleStar(id){
  if (!state.meId || id === state.meId) return;
  if (state.stars.has(id)) state.stars.delete(id);
  else state.stars.add(id);
  saveStars();
  render();
}

function claim(id){
  state.meId = id;
  localStorage.setItem(LS_ME, id);
  loadStars();
  loadPresent();
  state.openModal = null;
  state.confirmClaim = false;
  render();
}
function unclaim(){
  state.meId = null;
  localStorage.removeItem(LS_ME);
  state.stars = new Set();
  state.present = new Set();
  render();
}

function avatarStyle(p){
  return p.photo ? `background-image:url('images/${p.photo}')` : '';
}

function formatYear(d){
  if (!d) return '';
  const m = String(d).match(/^(\d{4})/);
  return m ? m[1] : '';
}
function dateRange(e){
  const start = formatYear(e.start);
  const end = e.current ? 'Present' : formatYear(e.end);
  if (!start && !end) return '';
  if (!start) return end;
  if (!end) return start;
  if (start === end && !e.current) return start;
  return `${start}\u2013${end}`;
}
function currentRoleLine(p){
  if (p.current && (p.current.title || p.current.company)){
    return [p.current.title, p.current.company].filter(Boolean).join(' \u00b7 ');
  }
  return p.role || '';
}
function socialLinksFor(p){
  const out = [];
  if (p.linkedin) out.push({label:'LinkedIn', url:p.linkedin});
  const s = p.socials || {};
  if (s.twitter) out.push({label:'Twitter', url:s.twitter});
  if (s.github) out.push({label:'GitHub', url:s.github});
  if (s.website) out.push({label:'Website', url:s.website});
  if (s.facebook) out.push({label:'Facebook', url:s.facebook});
  if (p.current && p.current.website && !s.website){
    out.push({label:'Company', url:p.current.website});
  }
  return out;
}

function el(tag, attrs, ...children){
  const n = document.createElement(tag);
  for (const k in (attrs||{})){
    const v = attrs[k];
    if (k === 'class') n.className = v;
    else if (k === 'style') n.setAttribute('style', v);
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v === true) n.setAttribute(k, '');
    else if (v !== false && v != null) n.setAttribute(k, v);
  }
  for (const c of children.flat()){
    if (c == null || c === false) continue;
    n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return n;
}

function starIcon(filled){
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 24 24');
  svg.setAttribute('fill', filled ? 'currentColor' : 'none');
  svg.setAttribute('stroke','currentColor');
  svg.setAttribute('stroke-width','2');
  svg.setAttribute('stroke-linecap','round');
  svg.setAttribute('stroke-linejoin','round');
  const path = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  path.setAttribute('points','12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2');
  svg.appendChild(path);
  return svg;
}

function linkIcon(){
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 24 24');
  svg.setAttribute('fill','none');
  svg.setAttribute('stroke','currentColor');
  svg.setAttribute('stroke-width','2');
  svg.setAttribute('stroke-linecap','round');
  svg.setAttribute('stroke-linejoin','round');
  svg.innerHTML = '<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>';
  return svg;
}

function renderHero(){
  return el('section', {class:'hero'},
    el('div',{class:'hero-eyebrow'}, 'a16z \u00b7 Founder Curious'),
    el('h1', {}, EVENT.name),
    el('div', {class:'subtitle'}, EVENT.date),
    el('div', {class:'meta'}, EVENT.location),
    !state.meId && el('div', {class:'claim-banner', style:'margin-top:22px'},
      el('span', {}, 'Welcome \u2014 tap your name below to '),
      el('strong', {}, 'claim your profile'),
    ),
  );
}

function renderDashHeader(){
  if (!state.meId) return null;
  const me = personById(state.meId);
  if (!me) return null;
  return el('header', {class:'dash-header'},
    el('div', {class:'dash-left'},
      el('div', {class:'dash-av', style:avatarStyle(me)}, !me.photo && initials(me.name)),
      el('div', {class:'dash-info'},
        el('div', {class:'label'}, 'You'),
        el('div', {class:'you'}, me.name),
      ),
    ),
    el('div', {class:'dash-right'},
      el('div', {class:'dash-count is-here'},
        el('strong', {}, `${state.present.size}/${PEOPLE.length}`),
        ' here',
      ),
      el('div', {class:'dash-count'},
        el('strong', {}, String(state.stars.size)),
        ' starred',
      ),
      el('button', {class:'dash-change', onclick: unclaim}, 'change'),
    ),
  );
}

function renderCard(p, i){
  const isMe = state.meId === p.id;
  const isStarred = state.stars.has(p.id);
  const classes = ['card'];
  if (isMe) classes.push('is-me');
  if (isStarred && !isMe) classes.push('is-starred');

  const children = [];
  if (p.host && !isMe) children.push(el('div', {class:'card-badge'}, 'Host'));
  if (isMe) children.push(el('div', {class:'card-you-badge'}, 'You'));

  if (state.meId && !isMe){
    const btn = el('button', {
      class:'star-btn' + (isStarred ? ' active' : ''),
      title: isStarred ? 'Starred' : 'Star',
      'aria-label': isStarred ? 'Remove star' : 'Add star',
      onclick: (e) => { e.stopPropagation(); toggleStar(p.id); },
    });
    btn.appendChild(starIcon(isStarred));
    children.push(btn);
  }

  const roleLine = (p.current && (p.current.title || p.current.company))
    ? [p.current.title, p.current.company].filter(Boolean).join(' \u00b7 ')
    : (p.role || '');

  const isHere = state.meId && state.present.has(p.id);
  const avClass = 'card-av' + (isHere ? ' is-here' : '');

  children.push(
    el('div', {class: avClass, style:avatarStyle(p)}, !p.photo && initials(p.name)),
    el('div', {class:'name'}, p.name),
    roleLine ? el('div', {class:'card-role'}, roleLine) : null,
    p.bio ? el('div', {class:'card-bio'}, p.bio) : null,
  );

  if (!state.meId){
    children.push(el('button', {
      class: 'card-claim-btn',
      onclick: (e) => {
        e.stopPropagation();
        state.openModal = p.id;
        state.confirmClaim = true;
        render();
      },
    }, 'This is me'));
  } else if (isMe){
    children.push(el('div', {class:'view-link'}, 'You\u2019re here'));
  } else {
    children.push(el('button', {
      class: 'card-here-btn' + (isHere ? ' active' : ''),
      'aria-pressed': isHere ? 'true' : 'false',
      onclick: (e) => { e.stopPropagation(); togglePresent(p.id); },
    }, isHere ? 'Here' : 'Mark as here'));
  }

  const card = el('div', {
    class: classes.join(' '),
    style: `animation-delay:${Math.min(i*0.02, 0.4)}s`,
    onclick: () => { state.openModal = p.id; render(); },
  }, ...children);

  return card;
}

function renderGrid(){
  const hosts = PEOPLE.filter(p => p.host);
  const guests = PEOPLE.filter(p => !p.host);
  const starredGuests = guests.filter(p => state.stars.has(p.id));
  const unstarredGuests = guests.filter(p => !state.stars.has(p.id));
  const hasStarred = !!state.meId && starredGuests.length > 0;
  const remainingGuests = hasStarred ? unstarredGuests : guests;
  const plural = (n) => n === 1 ? 'person' : 'people';

  const sections = [
    el('div', {class:'section-header'},
      el('h2', {}, 'Hosts'),
      el('div', {class:'count'}, `${hosts.length} ${plural(hosts.length)}`),
    ),
    el('div', {class:'grid'}, ...hosts.map((p, i) => renderCard(p, i))),
  ];

  if (hasStarred){
    sections.push(
      el('div', {class:'section-header'},
        el('h2', {}, 'Starred'),
        el('div', {class:'count'}, `${starredGuests.length} ${plural(starredGuests.length)}`),
      ),
      el('div', {class:'grid'}, ...starredGuests.map((p, i) => renderCard(p, i))),
    );
  }

  sections.push(
    el('div', {class:'section-header'},
      el('h2', {}, 'Guests'),
      el('div', {class:'count'}, `${remainingGuests.length} ${plural(remainingGuests.length)}`),
    ),
    el('div', {class:'grid'}, ...remainingGuests.map((p, i) => renderCard(p, i))),
  );

  return el('div', {}, ...sections);
}

function renderModal(){
  if (!state.openModal) return null;
  const p = personById(state.openModal);
  if (!p) return null;
  const isMe = state.meId === p.id;
  const isStarred = state.stars.has(p.id);
  const canClaim = !state.meId;
  const confirming = canClaim && state.confirmClaim;

  const close = () => { state.openModal = null; state.confirmClaim = false; render(); };
  const cancelConfirm = () => { state.confirmClaim = false; render(); };

  let body;
  const actions = [];

  if (confirming){
    body = el('div', {class:'modal-body'},
      el('div', {class:'modal-label'}, 'Confirm'),
      el('div', {class:'modal-bio'},
        'You\u2019re about to claim this profile as yours. You can change it anytime from the header.'
      ),
    );
    actions.push(el('button', {class:'btn-primary', onclick: () => claim(p.id)}, 'Yes, this is me'));
    actions.push(el('button', {class:'btn-secondary', onclick: cancelConfirm}, 'Not me \u2014 go back'));
  } else {
    body = el('div', {class:'modal-body'});

    if (p.bio){
      body.appendChild(el('div', {class:'modal-label'}, 'Tonight'));
      body.appendChild(el('div', {class:'modal-bio'}, p.bio));
    }

    if (p.headline){
      body.appendChild(el('div', {class:'modal-label'}, 'LinkedIn headline'));
      body.appendChild(el('div', {class:'modal-headline'}, p.headline));
    }

    if (p.employment && p.employment.length){
      body.appendChild(el('div', {class:'modal-label'}, 'Experience'));
      const list = el('div', {class:'timeline'});
      for (const e of p.employment.slice(0, 6)){
        const title = e.title || '\u2014';
        const company = e.company || '';
        list.appendChild(el('div', {class:'timeline-item'},
          el('div', {class:'timeline-main'},
            el('div', {class:'timeline-title'}, title),
            company ? el('div', {class:'timeline-sub'}, company) : null,
          ),
          el('div', {class:'timeline-range'}, dateRange(e)),
        ));
      }
      body.appendChild(list);
    }

    if (p.education && p.education.length){
      body.appendChild(el('div', {class:'modal-label'}, 'Education'));
      const list = el('div', {class:'timeline'});
      for (const ed of p.education.slice(0, 3)){
        const detail = [ed.degree, ed.field].filter(Boolean).join(' \u00b7 ');
        list.appendChild(el('div', {class:'timeline-item'},
          el('div', {class:'timeline-main'},
            el('div', {class:'timeline-title'}, ed.school || '\u2014'),
            detail ? el('div', {class:'timeline-sub'}, detail) : null,
          ),
          el('div', {class:'timeline-range'}, dateRange(ed)),
        ));
      }
      body.appendChild(list);
    }

    const socials = socialLinksFor(p);
    if (socials.length){
      body.appendChild(el('div', {class:'modal-label'}, 'Links'));
      const links = el('div', {class:'modal-links'});
      for (const s of socials){
        links.appendChild(el('a', {class:'modal-link', href:s.url, target:'_blank', rel:'noopener'},
          linkIcon(), el('span', {}, s.label)));
      }
      body.appendChild(links);
    }

    if (canClaim){
      actions.push(el('button', {class:'btn-primary', onclick: () => { state.confirmClaim = true; render(); }}, 'This is me \u2014 claim profile'));
      actions.push(el('button', {class:'btn-secondary', onclick: close}, 'Close'));
    } else if (isMe){
      actions.push(el('button', {class:'btn-secondary', onclick: close}, 'Close'));
    } else {
      const btn = el('button', {
        class: 'btn-star' + (isStarred ? ' active' : ''),
        onclick: () => { toggleStar(p.id); state.openModal = null; render(); },
      });
      btn.appendChild(starIcon(isStarred));
      btn.appendChild(document.createTextNode(isStarred ? 'Starred \u2014 tap to remove' : 'Star \u2014 someone interesting'));
      actions.push(btn);
      const isHere = state.present.has(p.id);
      actions.push(el('button', {
        class: 'btn-secondary' + (isHere ? ' is-here' : ''),
        onclick: () => { togglePresent(p.id); },
      }, isHere ? '\u2713 Marked as here \u2014 tap to remove' : 'Mark as here'));
      actions.push(el('button', {class:'btn-secondary', onclick: close}, 'Close'));
    }
  }

  const overlay = el('div', {class:'modal-overlay', onclick: close},
    el('div', {class:'modal', onclick: (e)=>e.stopPropagation()},
      el('button', {class:'modal-close', 'aria-label':'Close', onclick: close}, '\u00d7'),
      el('div', {class:'modal-head'},
        el('div', {class:'modal-av', style:avatarStyle(p)}, !p.photo && initials(p.name)),
        el('h3', {}, p.name),
        el('div', {class:'role'}, currentRoleLine(p)),
        p.location ? el('div', {class:'loc'}, p.location) : null,
        p.host ? el('div', {class:'host-tag'}, 'Host') : null,
      ),
      body,
      el('div', {class:'modal-actions'}, ...actions),
    ),
  );
  return overlay;
}

function renderFooter(){
  return el('footer', {class:'footer'},
    el('span', {}, EVENT.name),
    ' \u00b7 ',
    EVENT.date,
  );
}

function render(){
  const root = document.getElementById('root');
  root.innerHTML = '';
  const header = renderDashHeader();
  if (header) root.appendChild(header);
  root.appendChild(renderHero());
  root.appendChild(renderGrid());
  root.appendChild(renderFooter());
  const modal = renderModal();
  if (modal) root.appendChild(modal);
}

// ===== Passcode gate + decryption =====
const LS_PW = 'fc_pw_v1';

async function deriveKey(passcode, salt){
  const pwKey = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(passcode), {name:'PBKDF2'}, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:120000, hash:'SHA-256'},
    pwKey, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
}

async function tryDecrypt(passcode){
  const raw = Uint8Array.from(atob(ENCRYPTED_DATA), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16);
  const iv = raw.slice(16, 28);
  const ctWithTag = raw.slice(28);
  const key = await deriveKey(passcode, salt);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ctWithTag);
  return JSON.parse(new TextDecoder().decode(pt));
}

async function unlock(passcode){
  try {
    PEOPLE = await tryDecrypt(passcode);
    localStorage.setItem(LS_PW, passcode);
    loadStars();
    loadPresent();
    render();
    return true;
  } catch {
    return false;
  }
}

function renderGate(errorMsg){
  const root = document.getElementById('root');
  root.innerHTML = '';
  const input = el('input', {
    type:'password', class:'gate-input', placeholder:'passcode',
    autocomplete:'off', spellcheck:'false',
  });
  const errEl = el('div', {class:'gate-error' + (errorMsg ? ' show' : '')}, errorMsg || '\u00a0');
  const btn = el('button', {class:'gate-btn', type:'button'}, 'Unlock');
  const card = el('div', {class:'gate-card'},
    el('div', {class:'hero-eyebrow'}, 'a16z \u00b7 Founder Curious'),
    el('h1', {class:'gate-title'}, EVENT.name),
    el('div', {class:'gate-subtitle'}, EVENT.date),
    el('div', {class:'gate-meta'}, EVENT.location),
    el('div', {class:'gate-form'}, input, btn),
    errEl,
    el('div', {class:'gate-note'}, 'Shared with co-hosts only. Ask David for the passcode.'),
  );
  const submit = async () => {
    const val = input.value.trim();
    if (!val) return;
    btn.disabled = true;
    btn.textContent = 'Unlocking\u2026';
    const ok = await unlock(val);
    if (!ok){
      btn.disabled = false;
      btn.textContent = 'Unlock';
      renderGate('Incorrect passcode.');
    }
  };
  btn.addEventListener('click', submit);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
  root.appendChild(el('section', {class:'gate'}, card));
  setTimeout(() => input.focus(), 30);
}

async function boot(){
  if (!window.crypto || !window.crypto.subtle){
    document.getElementById('root').innerHTML =
      '<div style="padding:60px 24px;text-align:center;font-family:Inter">This browser does not support WebCrypto. Please open in Chrome, Safari, or Firefox.</div>';
    return;
  }
  const saved = localStorage.getItem(LS_PW);
  if (saved){
    const ok = await unlock(saved);
    if (ok) return;
    localStorage.removeItem(LS_PW);
  }
  renderGate();
}

boot();

document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (state.confirmClaim){ state.confirmClaim = false; render(); return; }
  if (state.openModal){ state.openModal = null; render(); }
});
